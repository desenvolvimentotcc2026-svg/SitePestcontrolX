<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Equipe - PestControlX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #334155;
            --border-color: #e2e8f0;
            --primary: #16a34a;
            --primary-hover: #15803d;
            --danger: #ef4444;
            --overlay: rgba(15, 23, 42, 0.4);
        }
        body.dark-theme {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --border-color: #334155;
            --overlay: rgba(0, 0, 0, 0.6);
        }
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-main); 
            padding: 20px; 
            transition: background 0.3s, color 0.3s; 
            margin: 0;
        }
        .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header-actions h2 { margin: 0; font-size: 1.5rem; }
        
        .btn-add { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600; 
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }
        .btn-add:hover { background: var(--primary-hover); }
        
        table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { background: rgba(0,0,0,0.02); font-weight: 600; color: var(--text-main); opacity: 0.8; }
        
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; display: inline-block; }
        .status-ativo { background: #dcfce7; color: #166534; }
        .status-campo { background: #fef08a; color: #854d0e; }
        .status-inativo { background: #fee2e2; color: #991b1b; }
        
        .actions-btn { background: transparent; border: none; color: #64748b; cursor: pointer; margin-right: 10px; font-size: 1rem; transition: color 0.2s; }
        .actions-btn:hover { color: var(--primary); }
        .actions-btn.btn-del:hover { color: var(--danger); }

        /* --- MODAL DA ARQUITETURA DE CADASTRO REAL --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 1000;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        
        .modal-container {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            width: 100%; max-width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.15);
            border: 1px solid var(--border-color);
            transform: scale(0.95); transition: transform 0.2s ease;
        }
        .modal-overlay.active .modal-container { transform: scale(1); }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h3 { margin: 0; font-size: 1.2rem; }
        .modal-close { background: transparent; border: none; color: #64748b; cursor: pointer; font-size: 1.2rem; }
        
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
        .form-input { 
            width: 100%; padding: 10px; 
            border-radius: 6px; border: 1px solid var(--border-color); 
            background: var(--bg-color); color: var(--text-main); 
            box-sizing: border-box; font-size: 14px;
        }
        .form-input:focus { outline: none; border-color: var(--primary); }
        
        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }
        .btn-cancel { background: transparent; border: 1px solid var(--border-color); color: var(--text-main); padding: 10px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .btn-save { background: var(--primary); color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .btn-save:hover { background: var(--primary-hover); }
    </style>
</head>
<body>

    <div class="header-actions">
        <h2>Técnicos e Operadores</h2>
        <button class="btn-add" onclick="abrirModal()"><i class="fa-solid fa-plus"></i> Novo Técnico</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Especialidade</th>
                <th>Contato</th>
                <th>Status</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="tabela-equipe">
            </tbody>
    </table>

    <div class="modal-overlay" id="modalTecnico">
        <div class="modal-container">
            <div class="modal-header">
                <h3 id="modal-titulo">Cadastrar Novo Operador</h3>
                <button class="modal-close" onclick="fecharModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="form-tecnico" onsubmit="salvarTecnico(event)">
                <input type="hidden" id="tec-id">
                <div class="form-group">
                    <label for="tec-nome">Nome Completo</label>
                    <input type="text" id="tec-nome" class="form-input" required placeholder="Ex: Carlos Silva">
                </div>
                <div class="form-group">
                    <label for="tec-espec">Especialidade / Foco</label>
                    <input type="text" id="tec-espec" class="form-input" required placeholder="Ex: Roedores e Escorpiões">
                </div>
                <div class="form-group">
                    <label for="tec-tel">Telefone de Contato</label>
                    <input type="text" id="tec-tel" class="form-input" required placeholder="Ex: (11) 99999-8888">
                </div>
                <div class="form-group">
                    <label for="tec-status">Status Operacional</label>
                    <select id="tec-status" class="form-input" required>
                        <option value="ativo">Disponível (Base)</option>
                        <option value="campo">Em Rota (Campo)</option>
                        <option value="inativo">Inativo / Férias</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" onclick="fecharModal()">Cancelar</button>
                    <button type="submit" class="btn-save">Salvar Integrante</button>
                </div>
            </form>
        </div>
    </div>
<script>
    // 🔄 Sincronização Automática com o barramento do Painel Pai (Light/Dark Mode e Contexto da Empresa)
    window.addEventListener('message', (event) => {
        if (event.data) {
            if (event.data.tipo === 'sincronizarTema') {
                document.body.className = event.data.tema === 'dark' ? 'dark-theme' : '';
            }
            // Se o painel pai injetar o ID da empresa dinamicamente via postMessage, guardamos na sessão
            if (event.data.tipo === 'definirEmpresa' && event.data.empresaId) {
                localStorage.setItem("empresaId", event.data.empresaId);
                carregarEquipeDaAPI();
            }
        }
    });

    // 🔗 DADOS DA API E SESSÃO
    const API_BASE_URL = "https://appdedetizacao.onrender.com";
    let equipe = [];

    // ⚡ CAPTURA DINÂMICA: Retorna o ID da empresa ativa na sessão atual (sem travar valores fixos)
    function obterEmpresaId() {
        let id = localStorage.getItem("empresaId") || localStorage.getItem("id_empresa") || "";
        return id.toString().replace(/^"|"$/g, '').trim();
    }

    // Função auxiliar para obter e limpar o token de autenticação
    function obterToken() {
        let token = localStorage.getItem("token") || localStorage.getItem("TOKEN_AUTH") || "";
        return token.replace(/^"|"$/g, '');
    }

    // LER: Busca técnicos do banco de dados e filtra pela empresa logada
    async function carregarEquipeDaAPI() {
        const token = obterToken();
        const empresaId = obterEmpresaId();

        // Salvaguarda: impede requisições cegas se o usuário perdeu a sessão
        if (!empresaId) {
            console.warn("ID da empresa ausente no localStorage.");
            const tbody = document.getElementById("tabela-equipe");
            tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#ef4444; padding:30px;">⚠️ Identificação da empresa não localizada. Por favor, refaça o login no sistema.</td></tr>`;
            return;
        }

        try {
            const response = await fetch(`${API_BASE_URL}/api/funcionarios`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            
            if (response.ok) {
                const todosFuncionarios = await response.json();
                
                // Filtra os funcionários garantindo correspondência dinâmica com a empresa logada
                equipe = todosFuncionarios.filter(tec => 
                    tec.empresa_id == empresaId || 
                    (tec.empresa && tec.empresa.id == empresaId)
                );
                
                renderizarEquipe();
            } else {
                console.error("Erro ao carregar funcionários do servidor:", response.status);
            }
        } catch (error) {
            console.error("Erro na rede ao buscar equipe:", error);
        }
    }

    // RENDERIZAR: Atualiza de forma segura a tabela na tela
    function renderizarEquipe() {
        const tbody = document.getElementById("tabela-equipe");
        tbody.innerHTML = "";

        if (equipe.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#64748b; padding:30px;">Nenhum técnico registrado na base da empresa.</td></tr>`;
            return;
        }

        equipe.forEach(tec => {
            const status = tec.status ? tec.status.toLowerCase() : 'inativo';
            let statusClass = (status === 'ativo' || status === 'online') ? 'status-ativo' : status === 'campo' ? 'status-campo' : 'status-inativo';
            let statusText = (status === 'ativo' || status === 'online') ? 'Disponível' : status === 'campo' ? 'Em Rota' : 'Offline / Férias';

            tbody.innerHTML += `
                <tr>
                    <td><strong>${tec.nome}</strong></td>
                    <td>${tec.cargo || 'Dedetização Geral'}</td>
                    <td>${tec.telefone || tec.email}</td>
                    <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                    <td>
                        <button class="actions-btn" onclick="editarTecnico(${tec.id})" title="Editar">
                            <i class="fa-solid fa-pen"></i>
                        </button>
                        <button class="actions-btn btn-del" onclick="deletarTecnico(${tec.id})" title="Excluir">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </td>
                </tr>
            `;
        });
    }

    function abrirModal() {
    document.getElementById('form-tecnico').reset();
    document.getElementById('tec-id').value = '';
    document.getElementById('tec-email').value = ''; 
    document.getElementById('modal-titulo').innerText = "Cadastrar Novo Operador";
    document.getElementById('modalTecnico').classList.add('active');
}

    function fecharModal() {
        document.getElementById('modalTecnico').classList.remove('active');
    }

    // CRIAR E ATUALIZAR: Envia dados salvos para a API do Spring Boot
    async function salvarTecnico(event) {
    event.preventDefault();

    const id = document.getElementById('tec-id').value;
    const telefoneForm = document.getElementById('tec-tel').value;
    const emailForm = document.getElementById('tec-email').value;
    const empresaId = obterEmpresaId();

    if (!empresaId) {
        alert("Erro crítico: Não foi possível identificar a sua empresa na sessão. Faça login novamente.");
        return;
    }

    const payload = {
        nome: document.getElementById('tec-nome').value,
        cargo: document.getElementById('tec-espec').value, 
        telefone: telefoneForm,
        status: document.getElementById('tec-status').value.toUpperCase(),
        ativo: true, 
        cpf: "00000000000", 
        email: emailForm 
    };

        // Montagem dinâmica da URL injetando o ID extraído da sessão logada
        const url = id ? `${API_BASE_URL}/api/funcionarios/${id}` : `${API_BASE_URL}/api/funcionarios?empresa_id=${empresaId}`;
        const metodo = id ? 'PUT' : 'POST';
        const token = obterToken();

        try {
            const response = await fetch(url, {
                method: metodo,
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                fecharModal();
                carregarEquipeDaAPI();
            } else {
                if (response.status === 401 || response.status === 403) {
                    alert("Sua sessão expirou ou você não tem permissão. Faça login novamente.");
                } else {
                    const errorMsg = await response.text();
                    alert(`Erro do Servidor (${response.status}): ${errorMsg || 'Erro na validação dos dados com o banco.'}`);
                }
            }
        } catch (error) {
            console.error("Falha na rede:", error);
            alert("Não foi possível conectar ao servidor. Verifique sua conexão de rede.");
        }
    }

    // EDICAO: Preenche o formulário a partir do ID localizado no estado local
    function editarTecnico(id) {
    const tec = equipe.find(t => t.id === id);
    if (!tec) return;

    document.getElementById('tec-id').value = tec.id;
    document.getElementById('tec-nome').value = tec.nome;
    document.getElementById('tec-espec').value = tec.cargo || "";
    document.getElementById('tec-tel').value = tec.telefone || "";
    document.getElementById('tec-email').value = tec.email || ""; 
    document.getElementById('tec-status').value = tec.status ? tec.status.toLowerCase() : "inativo";

    document.getElementById('modal-titulo').innerText = "Editar Credenciais";
    document.getElementById('modalTecnico').classList.add('active');
}

    // DELETAR: Remove do servidor via verbo DELETE
    async function deletarTecnico(id) {
        if (confirm("Deseja realmente remover este técnico de forma permanente?")) {
            const token = obterToken();

            try {
                const response = await fetch(`${API_BASE_URL}/api/funcionarios/${id}`, { 
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    carregarEquipeDaAPI();
                } else {
                    alert(`Não foi possível remover o operador. Código de erro: ${response.status}`);
                }
            } catch (error) {
                console.error("Falha ao deletar:", error);
                alert("Erro de rede ao tentar remover.");
            }
        }
    }

    // Inicialização primária ao carregar a tela
    document.addEventListener("DOMContentLoaded", () => {
        carregarEquipeDaAPI();
    });
</script>
</body>
</html>
