<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PestControlX - Central de Gerenciamento</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css"> 
    
    <!-- 🤖 SUITE DE ESTILOS AVANÇADOS PESTBOT CORE -->
    <style>
        #pestbot-widget {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 360px;
            background-color: var(--bg-card, #ffffff);
            border-radius: 16px;
            box-shadow: 0 12px 40px -8px rgba(0, 0, 0, 0.25);
            z-index: 9999;
            border: 1px solid var(--border-color, #e2e8f0);
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            font-family: system-ui, -apple-system, sans-serif;
        }
        
        #pestbot-widget.hidden {
            opacity: 0;
            transform: translateY(30px) scale(0.95);
            pointer-events: none;
        }

        .pestbot-header {
            background: linear-gradient(135deg, var(--primary, #16a34a), #15803d);
            color: #ffffff;
            padding: 16px 20px;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .pestbot-header .pestbot-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pestbot-header button {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .pestbot-header button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .pestbot-body {
            padding: 20px;
            font-size: 14px;
            color: var(--text-main, #334155);
            line-height: 1.6;
            background-color: var(--bg-card, #ffffff);
            max-height: 280px;
            overflow-y: auto;
        }

        /* Menu de Opções Numéricas Inteligentes */
        .pestbot-menu-list {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 0;
            list-style: none;
        }

        .pestbot-menu-item {
            background: var(--bg-body, #f8fafc);
            border: 1px solid var(--border-color, #e2e8f0);
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .pestbot-menu-item:hover {
            background-color: rgba(22, 163, 74, 0.08);
            border-color: var(--primary, #16a34a);
            transform: translateX(3px);
        }

        .pestbot-badge {
            background: var(--primary, #16a34a);
            color: white;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 4px;
            font-size: 11px;
        }

        /* Barra de Entrada de Comandos de Texto/Números */
        .pestbot-input-area {
            padding: 12px 20px 20px 20px;
            background: var(--bg-card, #ffffff);
            border-top: 1px solid var(--border-color, #e2e8f0);
            display: flex;
            gap: 8px;
        }

        .pestbot-input-wrapper {
            position: relative;
            flex: 1;
        }

        .pestbot-input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color, #cbd5e1);
            background: var(--bg-body, #f8fafc);
            color: var(--text-main, #0f172a);
            font-size: 13px;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        .pestbot-input:focus {
            outline: none;
            border-color: var(--primary, #16a34a);
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.15);
        }

        .pestbot-send-btn {
            background: var(--primary, #16a34a);
            color: white;
            border: none;
            padding: 0 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .pestbot-send-btn:hover {
            background: var(--primary-hover, #15803d);
        }

        /* Efeito de Destaque Guiado Profissional */
        .pestbot-highlight {
            position: relative;
            z-index: 10000;
            outline: 3px solid var(--primary, #16a34a);
            outline-offset: 4px;
            box-shadow: 0 0 0 9999px rgba(15, 23, 42, 0.65) !important;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        /* Botão na Topbar Mestra */
        .btn-ativar-bot {
            background-color: rgba(22, 163, 74, 0.1);
            color: var(--primary, #16a34a);
            border: 1px solid var(--primary, #16a34a);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: none;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-ativar-bot:hover {
            background-color: var(--primary, #16a34a);
            color: #fff;
        }

        .alert-pulse {
            border-left: 4px solid #eab308;
            background: rgba(234, 179, 8, 0.06);
            padding: 8px 12px;
            border-radius: 4px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-theme');
        }
    </script>

    <header class="topbar">
        <div class="topbar-left">
            <button class="toggle-btn" onclick="toggleMenu()" title="Recolher Menu">
                <i class="fa-solid fa-bars-staggered"></i>
            </button>
            <h1 class="topbar-title">
                <i class="fa-solid fa-shield-virus"></i> PestControlX <span>Soluções</span>
            </h1>
        </div>
        <div class="topbar-right">
            <!-- Botão de Ativação Rápida Superior -->
            <button id="btn-ligar-bot" class="btn-ativar-bot" onclick="pestBot.toggleBot(true)">
                <i class="fa-solid fa-robot"></i> Chamar PestBot
            </button>

            <div class="connection-badge">
                <span class="pulse-dot"></span> Terminal Seguro
            </div>
            <div class="topbar-avatar-container">
                <img id="imgPfpTopbar" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2364748b'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/></svg>" alt="Perfil">
            </div>
        </div>
    </header>

    <div class="app-body">
        <nav class="sidebar" id="sidebar">
            <div class="profile-area">
                <div class="profile-pic-container" id="passo-1-perfil">
                    <img id="imgPfpSidebar" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2364748b'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/></svg>">
                    <label class="change-pic-btn" for="filePfpInput" title="Atualizar Foto de Perfil">
                        <i class="fa-solid fa-camera"></i>
                    </label>
                </div>
                <input type="file" id="filePfpInput" accept="image/*" style="display:none;" onchange="uploadFotoPerfil(this)">
                
                <div class="user-info-wrapper">
                    <div id="userName">Carregando operador...</div>
                    <div id="userEmail">Autenticando sessão...</div>
                </div>
            </div>
            
            <div class="nav-buttons">
                <button id="passo-2-monitoramento" class="nav-btn active" onclick="navegar(this, 'solicitacoes.html')">
                    <i class="fa-solid fa-chart-line"></i> <span>Monitoramento</span>
                </button>

                <button class="nav-btn" onclick="navegar(this, 'equipe.html')">
                <i class="fa-solid fa-user-shield"></i> <span>Gestão de Equipe</span>
                </button>
                <button class="nav-btn" onclick="navegar(this, 'clientes.html')">
                    <i class="fa-solid fa-users"></i> <span>Clientes</span>
                </button>
                <button class="nav-btn" onclick="navegar(this, 'chat.html')">
                    <i class="fa-regular fa-comments"></i> <span>Chat ao Vivo</span>
                </button>
                <button id="alvo-sobre-empresa" class="nav-btn" onclick="navegar(this, 'sobre.html')">
                    <i class="fa-solid fa-building-shield"></i> <span>Sobre a Empresa</span>
                </button>
                <button class="nav-btn" onclick="navegar(this, 'configuracoestela.html')">
                    <i class="fa-solid fa-sliders"></i> <span>Configurações</span>
                </button>
            </div>

            <button class="logout-btn" onclick="logout()">
                <i class="fa-solid fa-power-off"></i> <span>SAIR</span>
            </button>
        </nav>

        <main class="main-content" id="mainContent">
            <iframe id="telaExterna" src="solicitacoes.html" onload="sincronizarTemaComIframe()"></iframe>
        </main>
    </div>

    <!-- 🤖 ARQUITETURA COGNITIVA INTERATIVA DO PESTBOT -->
    <script>
        const verificarSePerfilEstaCompleto = () => {
            const empresaId = localStorage.getItem("empresaId") || "1";
            const temDescricao = localStorage.getItem(`welcomeMsg_${empresaId}`);
            return !!temDescricao; 
        };

        class PestBotManager {
            constructor() {
                this.isActive = localStorage.getItem('pestbot_status') !== 'disabled';
                // Mapeamento dos módulos vinculados à ordem real dos seus botões na Sidebar
                this.modulos = [
    { num: 1, nome: "Monitoramento", file: "solicitacoes.html" },
    { num: 2, nome: "Gestão de Equipe", file: "equipe.html" }, // <-- ADICIONADO AQUI
    { num: 3, nome: "Clientes", file: "clientes.html" },
    { num: 4, nome: "Chat ao Vivo", file: "chat.html" },
    { num: 5, nome: "Sobre a Empresa", file: "sobre.html" },
    { num: 6, nome: "Configurações do Terminal", file: "configuracoestela.html" }
];
                this.init();
            }

            init() {
                const btnLigar = document.getElementById('btn-ligar-bot');
                if (!this.isActive) {
                    this.hideBotUI();
                    if(btnLigar) btnLigar.style.display = 'flex';
                    return;
                }
                
                if(btnLigar) btnLigar.style.display = 'none';
                this.renderBotUI();
                
                setTimeout(() => {
                    this.avaliarEstadoDoUsuario();
                }, 800);
            }

            renderBotUI() {
                this.hideBotUI();

                const botContainer = document.createElement('div');
                botContainer.id = 'pestbot-widget';
                botContainer.innerHTML = `
                    <div class="pestbot-header">
                        <div class="pestbot-status">
                            <i class="fa-solid fa-robot animate-pulse"></i> 
                            <span>PestBot v2.5 Core</span>
                        </div>
                        <button onclick="pestBot.toggleBot(false)"><i class="fa-solid fa-eye-slash"></i> Ocultar</button>
                    </div>
                    <div class="pestbot-body" id="pestbot-text-container">
                        Sincronizando barramento de dados...
                    </div>
                    <div class="pestbot-input-area">
                        <div class="pestbot-input-wrapper">
                            <input type="text" id="pestbot-cmd-input" class="pestbot-input" 
                                   placeholder="Digite o número do menu ou comando..." 
                                   onkeydown="if(event.key === 'Enter') pestBot.processarEntradaTxt()">
                        </div>
                        <button class="pestbot-send-btn" onclick="pestBot.processarEntradaTxt()">
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </div>
                `;
                document.body.appendChild(botContainer);
            }

            avaliarEstadoDoUsuario() {
                const tutorialFeito = localStorage.getItem('pestbot_tutorial_completo');
                const perfilCompleto = verificarSePerfilEstaCompleto();

                if (!tutorialFeito) {
                    this.iniciarTourGuiado();
                } else if (!perfilCompleto) {
                    this.solicitarPreenchimentoPerfilProativo();
                } else {
                    this.imprimirMenuPrincipal("Sistemas operando com 100% de integridade. Qual central deseja acessar?");
                }
            }

            // Mapeador de exibição estruturada do Menu Principal
            imprimirMenuPrincipal(mensagemInicial) {
                const txtContainer = document.getElementById('pestbot-text-container');
                let htmlMenu = `<p>${mensagemInicial}</p><ul class="pestbot-menu-list">`;
                
                this.modulos.forEach(mod => {
                    htmlMenu += `
                        <li class="pestbot-menu-item" onclick="pestBot.executarRoteamento(${mod.num})">
                            <span class="pestbot-badge">${mod.num}</span> <span>${mod.nome}</span>
                        </li>`;
                });
                
                htmlMenu += `
                    <li class="pestbot-menu-item" style="border-style: dashed;" onclick="pestBot.reiniciarTourCompleto()">
                        <span class="pestbot-badge" style="background:#64748b;"><i class="fa-solid fa-sync"></i></span> <span>Refazer Tour Guiado</span>
                    </li>
                </ul>`;
                
                txtContainer.innerHTML = htmlMenu;
            }

            // Processador inteligente do campo de input (Texto ou Número)
            processarEntradaTxt() {
                const inputEl = document.getElementById('pestbot-cmd-input');
                if (!inputEl) return;
                
                const entrada = inputEl.value.trim().toLowerCase();
                inputEl.value = ""; // Limpa a linha de comandos
                
                if (entrada === "") return;

                // Tenta analisar se o usuário digitou um número válido do menu
                const numComando = parseInt(entrada, 10);
                if (!isNaN(numComando) && numComando >= 1 && numComando <= this.modulos.length) {
                    this.executarRoteamento(numComando);
                    return;
                }

                // Atalhos de comandos por texto escrito
                if (entrada.includes("tour") || entrada.includes("ajuda") || entrada === "6") {
                    this.reiniciarTourCompleto();
                    return;
                }
                if (entrada.includes("perfil") || entrada.includes("sobre") || entrada.includes("empresa")) {
                    this.executarRoteamento(4);
                    return;
                }
                if (entrada.includes("config") || entrada.includes("ajuste")) {
                    this.executarRoteamento(5);
                    return;
                }
                if (entrada.includes("monitor") || entrada.includes("mapa")) {
                    this.executarRoteamento(1);
                    return;
                }

                // Fallback para entradas não reconhecidas pelo Core do Bot
                const txtContainer = document.getElementById('pestbot-text-container');
                txtContainer.innerHTML = `
                    <p style="color:#ef4444;"><i class="fa-solid fa-circle-xmark"></i> Comando <strong>"${entrada}"</strong> não reconhecido.</p>
                    <p>Digite apenas o <strong>número correspondente</strong> ou selecione uma das opções abaixo:</p>
                    <button class="pestbot-btn" onclick="pestBot.avaliarEstadoDoUsuario()">Voltar ao Menu Principal</button>
                `;
            }

            // Injetor Dinâmico de Roteamento Core - Aciona seu script de navegação nativo!
            executarRoteamento(idModulo) {
                this.limparHighlightsGerais();
                const dadosModulo = this.modulos.find(m => m.num === idModulo);
                
                if (!dadosModulo) return;

                // Seleciona dinamicamente a coleção de botões da sua sidebar
                const botoesSidebar = document.querySelectorAll('.nav-buttons .nav-btn');
                
                if (botoesSidebar && botoesSidebar.length >= idModulo) {
                    const botaoAlvo = botoesSidebar[idModulo - 1]; // Array começa em 0
                    
                    // Executa a sua própria função global "navegar" injetando o contexto de estilo correto!
                    if (typeof navegar === "function") {
                        navegar(botaoAlvo, dadosModulo.file);
                        
                        const txtContainer = document.getElementById('pestbot-text-container');
                        txtContainer.innerHTML = `
                            <p style="color: var(--primary, #16a34a); font-weight: 600;">
                                <i class="fa-solid fa-circle-check"></i> Redirecionando com sucesso!
                            </p>
                            <p>Você foi movido para o módulo de <strong>${dadosModulo.nome}</strong> através do Terminal.</p>
                            <button class="pestbot-btn" style="margin-top:10px;" onclick="pestBot.avaliarEstadoDoUsuario()"><i class="fa-solid fa-bars"></i> Ver Menu</button>
                        `;
                    } else {
                        // Backup de segurança caso a função não esteja no escopo global
                        const iframe = document.getElementById('telaExterna');
                        if (iframe) iframe.src = dadosModulo.file;
                    }
                }
            }

            // --- INTERCEPTAÇÃO PROATIVA: ERRO DE PERFIL INCOMPLETO ---
            solicitarPreenchimentoPerfilProativo() {
                const txt = document.getElementById('pestbot-text-container');
                txt.innerHTML = `
                    <div class="alert-pulse">
                        <strong style="color: #d97706;"><i class="fa-solid fa-triangle-exclamation"></i> Inconsistência de Dados</strong><br>
                        O perfil institucional da sua Dedetizadora está sem descrição no banco de dados.
                    </div>
                    <p>Escolha o que fazer:</p>
                    <ul class="pestbot-menu-list">
                        <li class="pestbot-menu-item" style="background: rgba(22, 163, 74, 0.1); border-color: var(--primary);" onclick="pestBot.executarRoteamento(4)">
                            <span class="pestbot-badge">4</span> <strong>Corrigir Agora (Recomendado)</strong>
                        </li>
                        <li class="pestbot-menu-item" onclick="pestBot.imprimirMenuPrincipal('Ignorando por enquanto... Qual painel quer ver?')">
                            <span class="pestbot-badge" style="background:#475569;"><i class="fa-solid fa-forward"></i></span> Ignorar Aviso e ver Menu
                        </li>
                    </ul>
                `;
            }

            // --- ESTÁGIO: TOUR INTERATIVO EM CAMADAS ---
            iniciarTourGuiado() {
                const txt = document.getElementById('pestbot-text-container');
                const alvo = document.getElementById('passo-1-perfil');
                if(alvo) alvo.classList.add('pestbot-highlight');

                txt.innerHTML = `
                    <p><strong>[Passo 1 de 2] - Identidade Operacional</strong><br>Este bloco gerencia as credenciais da sua equipe e a imagem de exibição do painel.</p>
                    <div class="pestbot-actions">
                        <button class="pestbot-btn" onclick="pestBot.tourPasso2()">Avançar Tour <i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                `;
            }

            tourPasso2() {
                document.getElementById('passo-1-perfil')?.classList.remove('pestbot-highlight');
                const txt = document.getElementById('pestbot-text-container');
                const alvo = document.getElementById('passo-2-monitoramento');
                if(alvo) alvo.classList.add('pestbot-highlight');

                txt.innerHTML = `
                    <p><strong>[Passo 2 de 2] - Monitoramento em Tempo Real</strong><br>Sua central de ordens de serviço. Os dados do mapa via satélite convergem exatamente para cá.</p>
                    <div class="pestbot-actions">
                        <button class="pestbot-btn" onclick="pestBot.finalizarTour()">Finalizar e Abrir Painel</button>
                    </div>
                `;
            }

            finalizarTour() {
                this.limparHighlightsGerais();
                localStorage.setItem('pestbot_tutorial_completo', 'true');
                this.avaliarEstadoDoUsuario();
            }

            reiniciarTourCompleto() {
                localStorage.removeItem('pestbot_tutorial_completo');
                this.iniciarTourGuiado();
            }

            limparHighlightsGerais() {
                document.getElementById('passo-1-perfil')?.classList.remove('pestbot-highlight');
                document.getElementById('passo-2-monitoramento')?.classList.remove('pestbot-highlight');
            }

            toggleBot(ativar) {
                if (ativar) {
                    localStorage.setItem('pestbot_status', 'active');
                    this.isActive = true;
                    this.init();
                } else {
                    localStorage.setItem('pestbot_status', 'disabled');
                    this.isActive = false;
                    this.hideBotUI();
                    this.limparHighlightsGerais();
                    const btnLigar = document.getElementById('btn-ligar-bot');
                    if(btnLigar) btnLigar.style.display = 'flex';
                }
            }

            hideBotUI() {
                const widget = document.getElementById('pestbot-widget');
                if (widget) widget.remove();
            }
        }

        // Inicialização em Sandbox Isolado
        document.addEventListener("DOMContentLoaded", () => {
            window.pestBot = new PestBotManager();
        });
    </script>
    <script src="js/dashboard_empresa.js"></script>
</body>
</html>
