<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>PestControlX - Terminal Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        body { 
            background: #0F0F12; 
            color: #3DDC84; 
            font-family: 'Courier New', monospace; 
            padding: 20px; 
            margin: 0;
            box-sizing: border-box;
        }
        .chat-layout {
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 20px;
            max-width: 900px;
            margin: 0 auto;
        }
        .channels-card {
            background: #11141D;
            border: 1px solid #2d3748;
            border-radius: 6px;
            padding: 15px;
        }
        .channel-item {
            padding: 10px;
            border-radius: 4px;
            background: rgba(255,255,255,0.02);
            margin-bottom: 8px;
            cursor: pointer;
            font-size: 12px;
            border-left: 3px solid transparent;
        }
        .channel-item.active {
            border-left-color: #3DDC84;
            background: rgba(61, 220, 132, 0.1);
            color: #fff;
        }
        #chat-window { 
            height: 380px; 
            border: 1px solid #2d3748; 
            border-radius: 6px; 
            overflow-y: auto; 
            padding: 15px; 
            margin-bottom: 15px; 
            background: #161B26; 
            box-shadow: 0 0 15px rgba(61,220,132,0.05); 
        }
        .input-area { display: flex; gap: 10px; }
        input { 
            flex: 1; padding: 12px; background: #0F0F12; border: 1px solid #3DDC84; 
            color: #fff; outline: none; font-family: inherit; border-radius: 4px;
        }
        input:focus { box-shadow: 0 0 10px rgba(61,220,132,0.3); }
        button { 
            padding: 12px 24px; background: #3DDC84; border: none; font-weight: bold; 
            cursor: pointer; color: #000; font-family: inherit; border-radius: 4px; transition: 0.2s;
        }
        button:hover { box-shadow: 0 0 15px #3DDC84; }
        .status-log { color: #a0aec0; font-size: 11px; margin-bottom: 10px;}
        .msg-line { margin: 6px 0; font-size: 13px; line-height: 1.4;}
    </style>
</head>
<body>

    <div style="max-width:900px; margin: 0 auto 15px auto;">
        <h1 style="font-size: 18px; text-shadow: 0 0 10px #3DDC84; margin: 0 0 5px 0;">
            <i class="fa-solid fa-terminal"></i> CORE_COMM_TERMINAL v2.2
        </h1>
        <p id="status-chat" class="status-log">> Inicializando barramento de comunicação...</p>
    </div>

    <div class="chat-layout">
        <div class="channels-card">
            <div style="font-size: 11px; color:#a0aec0; margin-bottom: 10px; font-weight: bold; text-transform: uppercase;">Terminais Remotos</div>
            <div class="channel-item active"><i class="fa-solid fa-headset"></i> Central Geral (OS)</div>
            <div class="channel-item" onclick="alert('Conexão direta com técnico de campo em desenvolvimento.')">
                <i class="fa-solid fa-truck-field"></i> Técnico Rádio #1
            </div>
        </div>

        <div>
            <div id="chat-window">
                <p class="status-log">>> [SISTEMA] Aguardando conexão segura com o servidor STOMP...</p>
            </div>
            
            <div class="input-area">
                <input type="text" id="msg" placeholder="Inserir mensagem para o aplicativo do cliente...">
                <button id="btn-transmitir">TRANSMITIR</button>
            </div>
        </div>
    </div>

    <script src="js/chat.js"></script> 
</body>
</html>
