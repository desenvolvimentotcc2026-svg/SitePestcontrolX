<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PestControlX - Terminal Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #16a34a;
            --bg-global: #f8fafc;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --chat-bubble-in: #f1f5f9;
            --chat-text-in: #1e293b;
        }

        [data-theme="dark"] {
            --primary: #22c55e;
            --bg-global: #0f172a;
            --surface: #1e293b;
            --border: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --chat-bubble-in: #334155;
            --chat-text-in: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }

        body {
            background-color: var(--bg-global);
            color: var(--text-main);
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .chat-container {
            display: grid;
            grid-template-columns: 260px 1fr;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            flex: 1;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .channels-sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 15px;
        }

        .sidebar-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
        }

        .channel-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            transition: all 0.2s;
            margin-bottom: 5px;
        }

        .channel-item.active {
            background: rgba(22, 163, 74, 0.1);
            color: var(--primary);
        }

        .channel-item:hover:not(.active) {
            background: var(--bg-global);
            color: var(--text-main);
        }

        .chat-main {
            display: flex;
            flex-direction: column;
            background: var(--bg-global);
        }

        .chat-header {
            background: var(--surface);
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-user-title { font-size: 15px; font-weight: 700; }

        #chat-window {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg-row { display: flex; width: 100%; }
        .msg-row.me { justify-content: flex-end; }
        .msg-row.received { justify-content: flex-start; }

        .bubble {
            max-width: 65%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }

        .me .bubble {
            background: var(--primary);
            color: #ffffff;
            border-bottom-right-radius: 4px;
        }

        .received .bubble {
            background: var(--chat-bubble-in);
            color: var(--chat-text-in);
            border-bottom-left-radius: 4px;
        }

        .input-area {
            background: var(--surface);
            padding: 15px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            background: var(--bg-global);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            outline: none;
            font-size: 14px;
        }

        .chat-input:focus { border-color: var(--primary); }

        .btn-send {
            padding: 0 20px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .btn-send:hover { background: var(--primary); opacity: 0.9; }
        .status-log { font-size: 12px; font-weight: 600; color: #eab308; }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="channels-sidebar">
            <div class="sidebar-title">Canais Ativos</div>
            <div class="channel-item active"><i class="fa-solid fa-headset"></i> Suporte ao Cliente</div>
            <div class="channel-item" onclick="alert('Módulo de rádio frequência com campo em pareamento.')">
                <i class="fa-solid fa-truck-field"></i> Técnico em Campo
            </div>
        </div>

        <div class="chat-main">
            <div class="chat-header">
                <div>
                    <div class="chat-user-title"><i class="fa-solid fa-circle text-emerald-500 text-[10px]"></i> Canal de Atendimento Direto</div>
                </div>
                <div id="status-chat" class="status-log">Conectando...</div>
            </div>

            <div id="chat-window">
            </div>

            <div class="input-area">
                <input type="text" id="msg" class="chat-input" placeholder="Digite sua mensagem para o cliente...">
                <button id="btn-transmitir" class="btn-send"><i class="fa-solid fa-paper-plane"></i> ENVIAR</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
