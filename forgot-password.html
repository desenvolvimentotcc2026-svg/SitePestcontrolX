<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PestControlX - Recuperação de Conta</title>
    <style>
        :root {
            --bg-global: #f8fafc;
            --card-bg: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --brand-green: #16a34a;
            --brand-green-hover: #15803d;
            --border-light: #e2e8f0;
            --input-focus: #bbf7d0;
        }
        body {
            background-color: var(--bg-global);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .recovery-container {
            background-color: var(--card-bg);
            padding: 45px 40px;
            border-radius: 16px;
            border: 1px solid var(--border-light);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 460px;
            box-sizing: border-box;
            overflow: hidden;
        }
        .brand-header { text-align: center; margin-bottom: 25px; }
        .brand-header img { max-height: 85px; }
        
        .step-panel { display: none; }
        .step-panel.active { display: block; }

        h2 { font-size: 18px; font-weight: 600; color: var(--text-primary); margin-bottom: 8px; margin-top: 0; }
        p.step-desc { color: var(--text-secondary); font-size: 13px; margin-bottom: 22px; line-height: 1.4; }
        .form-group { text-align: left; margin-bottom: 18px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--text-primary); }
        input { width: 100%; padding: 13px 16px; border: 1px solid var(--border-light); border-radius: 10px; background-color: #fff; color: var(--text-primary); font-size: 14px; box-sizing: border-box; transition: all 0.2s; }
        input:focus { outline: none; border-color: var(--brand-green); box-shadow: 0 0 0 3px var(--input-focus); }
        
        .btn-action { width: 100%; padding: 14px; background-color: var(--brand-green); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background-color 0.2s; }
        .btn-action:hover { background-color: var(--brand-green-hover); }
        
        .link-back { display: block; text-align: center; margin-top: 25px; color: var(--text-secondary); text-decoration: none; font-size: 13px; }
        .link-back:hover { color: var(--brand-green); text-decoration: underline; }
        .alert-box { margin-top: 15px; padding: 12px; border-radius: 10px; font-size: 13px; display: none; }
        .alert-error { background-color: #fef2f2; border: 1px solid #fee2e2; color: #991b1b; }
        .alert-success { background-color: #f0fdf4; border: 1px solid #dcfce7; color: #166534; }
    </style>
</head>
<body>

    <div class="recovery-container">
        <div class="brand-header">
            <img src="img/logo2 copy.png" alt="Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2942/2942780.png'">
        </div>
        
        <div id="panelStep1" class="step-panel active">
            <h2>Recuperar Palavra-passe</h2>
            <p class="step-desc">Introduza o seu e-mail corporativo para gerar um token de redefinição seguro.</p>

            <form id="forgotForm">
                <div class="form-group">
                    <label for="email">E-mail Corporativo</label>
                    <input type="email" id="email" placeholder="nome@empresa.com" required>
                </div>
                <button type="submit" class="btn-action">Enviar Código de Validação</button>
                <div id="alertStep1" class="alert-box"></div>
            </form>
        </div>

        <div id="panelStep2" class="step-panel">
            <h2>Definir Nova Senha</h2>
            <p class="step-desc">Insira o código recebido por e-mail e escolha a sua nova credencial de acesso.</p>
            
            <form id="resetForm">
                <div class="form-group">
                    <label for="confirmEmail">Confirmar o seu E-mail</label>
                    <input type="email" id="confirmEmail" placeholder="nome@empresa.com" required>
                </div>
                
                <div class="form-group">
                    <label for="codigo">Código de Verificação</label>
                    <input type="text" id="codigo" placeholder="Ex: 123456" maxlength="6" required>
                </div>

                <div class="form-group">
                    <label for="novaSenha">Nova Senha</label>
                    <input type="password" id="novaSenha" placeholder="Mínimo 8 caracteres" required>
                </div>

                <button type="submit" class="btn-action" style="background-color: #2563eb;">Atualizar Credenciais</button>
                <div id="alertStep2" class="alert-box"></div>
            </form>
        </div>

        <a href="index.html" class="link-back">← Voltar ao início da autenticação</a>
    </div>

    <script>
        const API_BASE_URL = 'https://appdedetizacao.onrender.com';

        // Lógica Etapa 1
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const alertBox = document.getElementById('alertStep1');

            try {
                const response = await fetch(`${API_BASE_URL}/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await response.json();

                if (response.ok) {
                    alertBox.className = 'alert-box alert-success';
                    alertBox.textContent = 'Código enviado! Redirecionando para a redefinição...';
                    alertBox.style.display = 'block';
                    
                    document.getElementById('confirmEmail').value = email;
                    
                    // Transiciona horizontalmente/visualmente de painel
                    setTimeout(() => {
                        document.getElementById('panelStep1').classList.remove('active');
                        document.getElementById('panelStep2').classList.add('active');
                    }, 1500);
                } else {
                    alertBox.className = 'alert-box alert-error';
                    alertBox.textContent = data.message || 'E-mail não registado na plataforma.';
                    alertBox.style.display = 'block';
                }
            } catch (err) {
                alertBox.className = 'alert-box alert-error';
                alertBox.textContent = 'Erro ao conectar ao servidor.';
                alertBox.style.display = 'block';
            }
        });

        // Lógica Etapa 2
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('confirmEmail').value;
            const codigo = document.getElementById('codigo').value;
            const novaSenha = document.getElementById('novaSenha').value;
            const alertBox = document.getElementById('alertStep2');

            try {
                const response = await fetch(`${API_BASE_URL}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, codigo, novaSenha })
                });
                const data = await response.json();

                if (response.ok) {
                    alertBox.className = 'alert-box alert-success';
                    alertBox.textContent = 'Atualização concluída com sucesso! Redirecionando...';
                    alertBox.style.display = 'block';
                    setTimeout(() => { window.location.href = 'index.html'; }, 1500);
                } else {
                    alertBox.className = 'alert-box alert-error';
                    alertBox.textContent = data.message || 'Token inválido ou dados incorretos.';
                    alertBox.style.display = 'block';
                }
            } catch (err) {
                alertBox.className = 'alert-box alert-error';
                alertBox.textContent = 'Erro de processamento da nova credencial.';
                alertBox.style.display = 'block';
            }
        });
    </script>
</body>
</html>
