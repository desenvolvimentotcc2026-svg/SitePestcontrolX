<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Institucional Corporativo - PestControlX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #16a34a;
            --primary-hover: #15803d;
            --primary-glow: rgba(22, 163, 74, 0.1);
            --bg-global: #f8fafc;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --phone-bg: #f1f5f9;
        }

        /* 🌙 Sincronização Automática com o Modo Escuro */
        body.dark-theme, [data-theme="dark"] {
            --primary: #22c55e;
            --primary-hover: #16a34a;
            --primary-glow: rgba(34, 197, 94, 0.15);
            --bg-global: #0f172a;
            --surface: #1e293b;
            --border: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --phone-bg: #0d1117;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: var(--text-main);
            background-color: var(--bg-global);
            margin: 0;
            padding: 25px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .header-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1.3fr;
            gap: 30px;
        }

        @media (max-width: 900px) {
            .main-grid { grid-template-columns: 1fr; }
        }

        .tech-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            height: fit-content;
        }

        /* 📱 Interface Simulada de Smartphone do Cliente */
        .phone-mockup {
            background-color: var(--phone-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 16px;
            text-align: left;
            margin-top: 15px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }

        .app-card-preview {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
        }

        .app-badge-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 12px 0;
        }

        .app-badge {
            font-size: 10px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 6px;
            text-transform: uppercase;
        }

        .badge-green { background: rgba(22, 163, 74, 0.1); color: var(--primary); }
        .badge-blue { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }

        .preview-text-box {
            font-size: 13px;
            color: var(--text-main);
            line-height: 1.5;
            min-height: 80px;
            word-break: break-word;
        }

        .form-grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-group { margin-bottom: 18px; text-align: left; }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tech-input, .tech-textarea {
            width: 100%;
            background: var(--bg-global);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            padding: 11px 14px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .tech-input:focus, .tech-textarea:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px var(--primary-glow);
            background: var(--surface);
        }

        /* 🪳 Especialidades Checkbox Grid */
        .specialty-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            background: var(--bg-global);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .specialty-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }

        .specialty-item input {
            accent-color: var(--primary);
            width: 15px;
            height: 15px;
        }

        .btn-sync {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 14px 20px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        .btn-sync:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .char-count { font-size: 11px; color: var(--text-muted); text-align: right; margin-top: 4px; }
    </style>
</head>
<body>

    <div class="header-container">
        <h1 style="font-size: 22px; margin: 0; display: flex; align-items: center; gap: 12px;">
            <i class="fa-solid fa-building-circle-gear" style="color:var(--primary)"></i> Hub do Perfil Institucional (Visão do Cliente)
        </h1>
        <span id="statusSalvar" style="font-weight: 700; font-size: 13px; text-transform: uppercase;"></span>
    </div>

    <div class="main-grid">
        
        <div class="tech-card" style="text-align: center;">
            <i class="fa-solid fa-mobile-screen-button" style="font-size: 24px; color: var(--text-muted);"></i>
            <span style="font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-left: 5px;">Preview Dinâmico no App</span>
            
            <div class="phone-mockup">
                <div class="app-card-preview">
                    <div style="display: flex; justify-content: space-between; align-items: start;">
                        <div>
                            <h2 id="viewNome" style="margin: 0; font-size: 18px; font-weight: 700; color: var(--text-main);">PestControlX</h2>
                            <div id="viewCnpj" style="font-size: 11px; color: var(--text-muted); margin-top: 2px;">CNPJ: 00.000.000/0001-00</div>
                        </div>
                        <div style="background: #fef08a; color: #a16207; font-size: 11px; font-weight: 700; padding: 2px 6px; border-radius: 6px;">
                            ★ 4.9 (M98)
                        </div>
                    </div>

                    <div class="app-badge-row">
                        <span id="badgeLicenca" class="app-badge badge-blue"><i class="fa-solid fa-file-shield"></i> Vigilância Ativa</span>
                        <span id="viewHorario" class="app-badge badge-green"><i class="fa-regular fa-clock"></i> 24h Disponível</span>
                    </div>

                    <div id="viewSobre" class="preview-text-box">
                        Carregando descrição do cluster...
                    </div>

                    <div id="previewTags" style="display: flex; gap: 5px; flex-wrap: wrap; margin-top: 15px; border-top: 1px solid var(--border); padding-top: 12px;">
                        </div>
                </div>
            </div>
        </div>

        <div class="tech-card">
            <h3 style="margin: 0 0 20px 0; font-size: 15px; color: var(--primary); display: flex; align-items: center; gap: 8px; text-transform: uppercase; letter-spacing: 0.5px;">
                <i class="fa-solid fa-pen-to-square"></i> Editor de Metadados do App móvel
            </h3>
            
            <form id="formSobre">
                <div class="form-group">
                    <label for="inputSobre">Descrição Corporativa da Dedetizadora</label>
                    <textarea id="inputSobre" class="tech-textarea" rows="4" maxlength="600" placeholder="Detalhe suas certificações (Ex: Registrada na ANVISA, químicos com selo verde, atendimento residencial e industrial)..."></textarea>
                    <div id="counter" class="char-count">0 / 600 caracteres</div>
                </div>

                <div class="form-grid-2">
                    <div class="form-group">
                        <label for="inputContatos">Contato de Plantão Operacional</label>
                        <input type="text" id="inputContatos" class="tech-input" placeholder="(11) 99999-0000">
                    </div>
                    <div class="form-group">
                        <label for="inputFuncionamento">Janela de Atendimento</label>
                        <input type="text" id="inputFuncionamento" class="tech-input" placeholder="Ex: Seg a Sex das 08h às 22h">
                    </div>
                </div>

                <div class="form-grid-2">
                    <div class="form-group">
                        <label for="inputLicencaNum">Registro/Licença Sanitária (ANVISA/CVE)</label>
                        <input type="text" id="inputLicencaNum" class="tech-input" placeholder="Ex: CEVS 355030801">
                    </div>
                    <div class="form-group">
                        <label for="inputQuimico">Responsável Técnico (CRQ/CRBio)</label>
                        <input type="text" id="inputQuimico" class="tech-input" placeholder="Ex: Dr. Silva - CRQ 042000">
                    </div>
                </div>

                <div class="form-group">
                    <label>Especialidades Homologadas para Controle</label>
                    <div class="specialty-grid">
                        <label class="specialty-item"><input type="checkbox" class="chk-spec" value="🪳 Desinsetização" checked> 🪳 Insetos (Geral)</label>
                        <label class="specialty-item"><input type="checkbox" class="chk-spec" value="🐀 Desratização" checked> 🐀 Roedores</label>
                        <label class="specialty-item"><input type="checkbox" class="chk-spec" value="🪵 Descupinização"> 🪵 Cupins</label>
                        <label class="specialty-item"><input type="checkbox" class="chk-spec" value="🚰 Reservatórios"> 🚰 Caixas d'Água</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="inputWelcome"><i class="fa-regular fa-comment-dots"></i> Resposta Automática no Chat do Cliente</label>
                    <input type="text" id="inputWelcome" class="tech-input" placeholder="Mensagem enviada na abertura imediata de uma O.S.">
                </div>

                <button type="submit" class="btn-sync">
                    <i class="fa-solid fa-cloud-arrow-up"></i> Sincronizar Informações no App
                </button>
            </form>
        </div>
    </div>

    <script src="js/sobre.js" defer></script>
</body>
</html>
