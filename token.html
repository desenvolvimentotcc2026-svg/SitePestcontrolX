<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PestControlX - Verificação de Identidade</title>
    <style>
        :root {
            --bg-global: #f8fafc;
            --card-bg: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --brand-green: #16a34a;
            --brand-green-hover: #15803d;
            --border-light: #e2e8f0;
            --input-focus: #bbf7d0;
        }

        /* 🌙 Tokens de Cor para o Modo Escuro sincronizado */
        [data-theme="dark"] {
            --bg-global: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --brand-green: #22c55e;
            --brand-green-hover: #16a34a;
            --border-light: #334155;
            --input-focus: #14532d;
        }

        body {
            background-color: var(--bg-global);
            color: var(--text-primary);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            transition: background-color 0.3s ease, color 0.3s ease;
            position: relative;
        }

        /* ⚙️ Barra de Recursos Superior Contida */
        .top-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
        }

        .control-btn {
            background-color: var(--card-bg);
            border: 1px solid var(--border-light);
            color: var(--text-secondary);
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: all 0.2s ease;
        }

        .control-btn:hover {
            color: var(--text-primary);
            border-color: var(--brand-green);
        }

        .token-wrapper {
            background-color: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            padding: 45px 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            text-align: center;
            box-sizing: border-box;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .brand-header img.logo { 
            max-height: 85px; 
            margin-bottom: 16px; 
        }

        h2 { font-size: 20px; font-weight: 600; margin: 0 0 10px 0; color: var(--text-primary); }
        p.description { color: var(--text-secondary); font-size: 14px; margin-bottom: 25px; line-height: 1.5; }
        
        /* Destaque para o e-mail institucional dinâmico */
        .email-highlight {
            color: var(--text-primary);
            font-weight: 600;
            display: block;
            margin-top: 5px;
        }

        .input-code-group input { 
            width: 100%; 
            padding: 14px; 
            background-color: var(--card-bg); 
            border: 1px solid var(--border-light); 
            border-radius: 10px; 
            color: var(--text-primary); 
            font-size: 24px; 
            font-weight: 700; 
            letter-spacing: 8px; 
            text-align: center; 
            box-sizing: border-box; 
            transition: all 0.2s; 
        }
        
        .input-code-group input:focus { outline: none; border-color: var(--brand-green); box-shadow: 0 0 0 3px var(--input-focus); }
        
        .btn-verify { width: 100%; padding: 14px; background-color: var(--brand-green); border: none; border-radius: 10px; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; transition: background-color 0.2s; margin-top: 25px; }
        .btn-verify:hover { background-color: var(--brand-green-hover); }
        
        /* Área de Reenvio de Código */
        .resend-container {
            margin-top: 20px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .resend-btn {
            color: var(--brand-green);
            text-decoration: none;
            font-weight: 500;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            font-size: 13px;
        }

        .resend-btn:disabled {
            color: var(--text-secondary);
            cursor: not-allowed;
            text-decoration: none;
        }

        .resend-btn:not(:disabled):hover {
            text-decoration: underline;
        }

        .back-to-login { display: inline-block; margin-top: 20px; color: var(--text-secondary); text-decoration: none; font-size: 13px; }
        .back-to-login:hover { color: var(--brand-green); text-decoration: underline; }
        
        .alert-box { margin-top: 15px; padding: 12px; border-radius: 10px; font-size: 13px; display: none; text-align: left; }
        .alert-error { background-color: #fef2f2; border: 1px solid #fee2e2; color: #991b1b; }
        .alert-success { background-color: #f0fdf4; border: 1px solid #dcfce7; color: #166534; }
    </style>
</head>
<body>

    <div class="top-controls">
        <button id="themeToggle" class="control-btn">🌙 Modo Escuro</button>
    </div>

    <div class="token-wrapper">
        <div class="brand-header">
            <img src="img/logo2 copy.png" alt="Logo" class="logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2942/2942780.png'">
        </div>

        <h2>Verificação de Segurança</h2>
        <p class="description">
            Introduza o código de validação de 6 dígitos enviado para:
            <span id="targetEmail" class="email-highlight">carregando...</span>
        </p>

        <form id="tokenForm">
            <div class="input-code-group">
                <input type="text" id="codigo" placeholder="000000" maxlength="6" autocomplete="off" required>
            </div>

            <button type="submit" class="btn-verify">Confirmar Identidade</button>
            <div id="alertBox" class="alert-box"></div>

            <div class="resend-container">
                Não recebeu o código? 
               <button id="btn-reenviar">Não recebi o código. Reenviar</button>

                <a href="#" id="btn-reenviar">Reenviar Código</a>
            </div>

            <a href="index.html" class="back-to-login">← Voltar para o Login</a>
        </form>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const form = document.getElementById("tokenForm");
            const BASE_URL = "https://appdedetizacao.onrender.com";
            const targetEmailSpan = document.getElementById("targetEmail");
            const resendBtn = document.getElementById("resendBtn");
            const themeToggleBtn = document.getElementById('themeToggle');

            // 🌓 Sincronização Inteligente do Tema Escuro
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeToggleBtn.textContent = '☀️ Modo Claro';
            }

            themeToggleBtn.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                if (currentTheme === 'dark') {
                    document.documentElement.removeAttribute('data-theme');
                    localStorage.setItem('theme', 'light');
                    themeToggleBtn.textContent = '🌙 Modo Escuro';
                } else {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    localStorage.setItem('theme', 'dark');
                    themeToggleBtn.textContent = '☀️ Modo Claro';
                }
            });

            // 📩 Recuperação e Mascaramento Seguro do E-mail
            const email = localStorage.getItem("emailTemp") || localStorage.getItem("logging_email");
            if (email) {
                targetEmailSpan.textContent = maskEmail(email);
            } else {
                targetEmailSpan.textContent = "seu e-mail institucional";
            }

            function maskEmail(fullEmail) {
                const [username, domain] = fullEmail.split("@");
                if (username.length <= 2) return `***@${domain}`;
                return `${username.substring(0, 2)}***@${domain}`;
            }

            // ⏱️ Controle do Temporizador de Reenvio
            let countdown = 60;
            function startCountdown() {
                resendBtn.disabled = true;
                countdown = 60;
                const interval = setInterval(() => {
                    countdown--;
                    resendBtn.textContent = `Reenviar (${countdown}s)`;
                    if (countdown <= 0) {
                        clearInterval(interval);
                        resendBtn.disabled = false;
                        resendBtn.textContent = "Reenviar Código";
                    }
                }, 1000);
            }
            startCountdown(); // Inicia o contador assim que a página carrega

            // 🔄 Integração do Evento de Reenvio à sua API existente
            resendBtn.addEventListener("click", async () => {
                const alertBox = document.getElementById("alertBox");
                alertBox.style.display = "none";
                
                try {
                    resendBtn.disabled = true;
                    resendBtn.textContent = "Solicitando...";
                    
                    // Dispara a mesma chamada de auth que gera o token por e-mail
                    const response = await fetch(`${BASE_URL}/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: email, tipoUsuario: "EMPRESA", tipo: "EMPRESA" })
                    });

                    if (response.ok) {
                        alertBox.className = "alert-box alert-success";
                        alertBox.textContent = "Um novo código de acesso foi disparado para a sua caixa!";
                        alertBox.style.display = "block";
                        startCountdown();
                    } else {
                        throw new Error("Não foi possível solicitar um novo código. Tente novamente.");
                    }
                } catch (err) {
                    alertBox.className = "alert-box alert-error";
                    alertBox.textContent = err.message;
                    alertBox.style.display = "block";
                    resendBtn.disabled = false;
                    resendBtn.textContent = "Reenviar Código";
                }
            });

            // 🚀 Validação do Token Original (Preservado Intacto)
            form.addEventListener("submit", function (e) {
                e.preventDefault();
                validarToken();
            });

            async function validarToken() {
                const codigoInput = document.getElementById("codigo");
                const btnSubmit = form.querySelector("button");
                const alertBox = document.getElementById("alertBox");
                
                if (!codigoInput || !alertBox) return;

                const codigo = codigoInput.value.trim();

                if (!email) {
                    alertBox.className = "alert-box alert-error";
                    alertBox.textContent = "Sessão expirada ou inválida. Retornando ao login...";
                    alertBox.style.display = "block";
                    setTimeout(() => { window.location.href = "index.html"; }, 2000);
                    return;
                }

                if (!codigo || codigo.length < 6) {
                    alertBox.className = "alert-box alert-error";
                    alertBox.textContent = "Por favor, insira o código de autenticação completo (6 dígitos).";
                    alertBox.style.display = "block";
                    return;
                }

                const originalText = btnSubmit.innerHTML;
                btnSubmit.innerHTML = "〈 VALIDANDO ACESSO... 〉";
                btnSubmit.disabled = true;
                btnSubmit.style.boxShadow = "0 0 15px #00ffcc"; 
                alertBox.style.display = "none";

                try {
                    const response = await fetch(`${BASE_URL}/auth/validar`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ email, codigo })
                    });

                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        throw new Error(errorData.message || "Código de autenticação inválido ou expirado.");
                    }

                    const data = await response.json();
                    const tokenGerado = data.token || data.token_usuario || data.accessToken;
                    if (!tokenGerado) throw new Error("Erro crítico: Chave JWT ausente.");

                    let idEncontrado = data.idEmpresa || data.id || data.empresaId || data.usuarioId;
                    if (!idEncontrado && data.usuario) idEncontrado = data.usuario.id;
                    if (!idEncontrado && data.empresa) idEncontrado = data.empresa.id;
                    
                    if (!idEncontrado) throw new Error("Erro de sincronização com ID corporativo.");

                    localStorage.removeItem("emailTemp");
                    localStorage.removeItem("logging_email");

                    localStorage.setItem("token", tokenGerado);
                    localStorage.setItem("token_usuario", tokenGerado);
                    localStorage.setItem("TOKEN_AUTH", tokenGerado);
                    localStorage.setItem("empresaId", String(idEncontrado));
                    localStorage.setItem("usuario_id", String(idEncontrado));
                    
                    const nomeExibicao = data.nome || (data.empresa ? data.empresa.nome : null) || "Operador Corporativo";
                    localStorage.setItem("tipoUsuario", data.tipo || "EMPRESA");
                    localStorage.setItem("userName", nomeExibicao);
                    localStorage.setItem("userEmail", email);

                    alertBox.className = "alert-box alert-success";
                    alertBox.textContent = "Acesso autorizado! Estabelecendo conexão segura...";
                    alertBox.style.display = "block";

                    btnSubmit.innerHTML = "〈 CONEXÃO ESTABELECIDA 〉";
                    btnSubmit.style.boxShadow = "0 0 20px #00ff55";
                    btnSubmit.style.color = "#00ff55";

                    const tipoTratado = data.tipo ? data.tipo.toUpperCase() : "EMPRESA";
                    let destino = "dashboard_empresa.html";
                    
                    if (tipoTratado === "ADMIN" || tipoTratado === "ADMINISTRADOR") destino = "dashboard_admin.html";
                    else if (tipoTratado === "CLIENTE") destino = "dashboard_cliente.html";

                    setTimeout(() => { window.location.href = destino; }, 1200);

                } catch (err) {
                    alertBox.className = "alert-box alert-error";
                    alertBox.textContent = err.message;
                    alertBox.style.display = "block";

                    btnSubmit.innerHTML = originalText;
                    btnSubmit.disabled = false;
                    btnSubmit.style.boxShadow = "";
                    btnSubmit.style.color = "";
                }
            }
        });
    </script>
</body>
</html>
