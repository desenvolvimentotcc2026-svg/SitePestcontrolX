<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>PestControlX - Nova Ordem de Serviço</title>
    <style>
        body {
            background-color: #0A0F1D;
            color: #FFFFFF;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #111E30;
            padding: 30px;
            border-radius: 8px;
            border: 2px solid #00F0FF;
            box-shadow: 0 0 15px #00F0FF;
        }
        h2 { color: #00F0FF; text-shadow: 0 0 5px #00F0FF; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #A0AEC0; }
        input, select, textarea {
            width: 100%; padding: 10px; margin-top: 5px;
            background-color: #0A0F1D; border: 1px solid #00F0FF;
            color: white; border-radius: 4px; box-sizing: border-box;
        }
        button {
            width: 100%; padding: 12px; margin-top: 25px;
            background-color: #00F0FF; border: none; color: #0A0F1D;
            font-weight: bold; font-size: 16px; cursor: pointer;
            border-radius: 4px; box-shadow: 0 0 10px #00F0FF;
        }
        button:hover { background-color: #00B3CC; }
    </style>
</head>
<body>

<div class="container">
    <h2>📝 GERAÇÃO DE ORDEM DE SERVIÇO</h2>
    <p>Preencha os dados abaixo para despachar a equipe técnica em campo.</p>
    
    <form id="formOrdem">
        <label>ID do Cliente (Coletado Automaticamente)</label>
        <input type="text" id="clienteId" readonly>

        <label>ID da Empresa</label>
        <input type="text" id="empresaId" readonly>

        <label>Tipo de Vetor / Praga Relatada</label>
        <select id="pragaAlvo">
            <option value="BARATA">Blatella germanica (Baratas)</option>
            <option value="ROEDOR">Rattus norvegicus (Roedores)</option>
            <option value="ESCORPIAO">Tityus serrulatus (Escorpiões)</option>
            <option value="CUPIM">Coptotermes gestroi (Cupins)</option>
        </select>

        <label>Descrição Crítica do Local / Sintomas</label>
        <textarea id="descricao" rows="4" placeholder="Ex: Foco detectado no subsolo da cozinha industrial..."></textarea>

        <button type="submit">DESPACHAR ORDEM DE SERVIÇO</button>
    </form>
</div>

<script src="js/ordem.js"></script>
</body>
</html>
