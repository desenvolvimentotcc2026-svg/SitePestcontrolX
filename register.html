<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | PestControlX</title>
    <style>
        :root {
            --bg-global: #f8fafc;
            --card-bg: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --brand-green: #16a34a;
            --brand-green-hover: #15803d;
            --border-light: #e2e8f0;
            --input-focus: #bbf7d0;
        }
        body {
            background-color: var(--bg-global);
            color: var(--text-primary);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
        }
        .brand-container {
            text-align: center;
            margin-bottom: 25px;
        }
        .brand-container .logo-img {
            max-height: 85px;
            margin-bottom: 10px;
        }
        .brand-container .app-name-img {
            display: block;
            max-height: 24px;
            margin: 0 auto;
        }
        .glass-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            text-align: left;
        }
        .input-group.full {
            grid-column: span 2;
        }
        .input-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        .input-group input, .select-wrapper select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border-light);
            border-radius: 10px;
            background-color: #fff;
            color: var(--text-primary);
            font-size: 14px;
            box-sizing: border-box;
            transition: all 0.2s;
        }
        .input-group input:focus, .select-wrapper select:focus {
            outline: none;
            border-color: var(--brand-green);
            box-shadow: 0 0 0 3px var(--input-focus);
        }
        .select-wrapper {
            margin-bottom: 20px;
        }
        .step {
            display: none;
        }
        .step.active {
            display: block;
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background-color: var(--brand-green);
            border: none;
            border-radius: 10px;
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        .btn-primary:hover {
            background-color: var(--brand-green-hover);
        }
        .actions-footer {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .btn-ghost {
            width: 35%;
            padding: 14px;
            background-color: transparent;
            border: 1px solid var(--border-light);
            border-radius: 10px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-ghost:hover {
            background-color: #f1f5f9;
            color: var(--text-primary);
        }
    </style>
</head>
<body>

    <div class="brand-container">
        <div class="logo-wrapper">
            <img src="img/logo2 copy.png" alt="Logo" class="logo-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2942/2942780.png'">
        </div>
        <img src="img/nomeapp copy.png" alt="PestControlX" class="app-name-img" onerror="this.style.display='none'">
    </div>

    <div class="glass-card">
        <div class="input-group full">
            <label for="tipo">Tipo de Perfil Requerido</label>
            <div class="select-wrapper">
                <select id="tipo" onchange="toggleCnpjField()">
                    <option value="" disabled selected>Selecione o nível de acesso</option>
                    <option value="EMPRESA">Empresa (Painel de Gestão)</option>
                    <option value="FUNCIONARIO">Técnico / Suporte Corporativo</option>
                </select>
            </div>
        </div>

        <form id="registerForm">
            <div id="step1" class="step active">
                <div class="form-grid">
                    <div class="input-group full">
                        <label for="nome">Nome Completo / Razão Social</label>
                        <input type="text" id="nome" placeholder="Digite seu nome ou da empresa" required>
                    </div>
                    <div class="input-group">
                        <label for="cep">CEP</label>
                        <input type="text" id="cep" placeholder="00000-000">
                    </div>
                    <div class="input-group">
                        <label for="numero">Número</label>
                        <input type="text" id="numero" placeholder="Ex: 123">
                    </div>
                    <div class="input-group full">
                        <label for="rua">Rua / Logradouro</label>
                        <input type="text" id="rua" placeholder="Rua...">
                    </div>
                    <div class="input-group full">
                        <label for="bairro">Bairro</label>
                        <input type="text" id="bairro" placeholder="Bairro">
                    </div>
                </div>
                <button type="button" class="btn-primary" onclick="nextStep()">Próximo Passo →</button>
            </div>

            <div id="step2" class="step">
                <div class="form-grid">
                    <div class="input-group full">
                        <label for="email">E-mail Corporativo</label>
                        <input type="email" id="email" placeholder="nome@empresa.com" required>
                    </div>
                    <div class="input-group full">
                        <label for="senha">Senha de Acesso</label>
                        <input type="password" id="senha" placeholder="Mínimo 8 caracteres" required>
                    </div>
                    <div class="input-group full" id="cnpjGroup" style="display:none;">
                        <label for="cnpj" id="lblCnpj">CNPJ da Unidade</label>
                        <input type="text" id="cnpj" placeholder="00.000.000/0001-00">
                    </div>
                </div>
                <div class="actions-footer">
                    <button type="button" class="btn-ghost" onclick="prevStep()">Voltar</button>
                    <button type="submit" id="btnSubmit" class="btn-primary" style="flex: 1;">Finalizar Cadastro</button>
                </div>
            </div>
        </form>
    </div>

    <script>
        function nextStep() {
            const tipo = document.getElementById('tipo').value;
            const nome = document.getElementById('nome').value;
            
            if (!tipo || !nome) {
                alert("Por favor, selecione o tipo de perfil e preencha seu nome!");
                return;
            }
            
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
        }

        function prevStep() {
            document.getElementById('step2').classList.remove('active');
            document.getElementById('step1').classList.add('active');
        }

        function toggleCnpjField() {
            const tipo = document.getElementById('tipo').value;
            const cnpjGroup = document.getElementById('cnpjGroup');
            const lblCnpj = document.getElementById('lblCnpj');
            const inputCnpj = document.getElementById('cnpj');
            
            if (tipo === 'EMPRESA') {
                cnpjGroup.style.display = 'block';
                lblCnpj.innerText = "CNPJ da Empresa (Apenas Números)";
                inputCnpj.placeholder = "Ex: 12345678000199";
            } else if (tipo === 'FUNCIONARIO') {
                // Técnicos precisam do ID da empresa para se vincular no Java
                cnpjGroup.style.display = 'block';
                lblCnpj.innerText = "ID da Empresa Contratante (Para Vínculo)";
                inputCnpj.placeholder = "Ex: 42";
            } else {
                cnpjGroup.style.display = 'none';
            }
        }

        // JS ENCAPSULADO E BLINDADO CONTRA CRASHES
        document.addEventListener("DOMContentLoaded", () => {
            const form = document.getElementById("registerForm");
            const cepInput = document.getElementById("cep");
            const ruaInput = document.getElementById("rua");
            const bairroInput = document.getElementById("bairro");
            const btnSubmit = document.getElementById("btnSubmit");
            
            const BASE_URL = "https://appdedetizacao.onrender.com";

            // Busca CEP
            cepInput.addEventListener("blur", () => {
                let cep = cepInput.value.replace(/\D/g, '');
                if (cep.length === 8) {
                    ruaInput.value = "Buscando...";
                    bairroInput.value = "Buscando...";
                    fetch(`https://viacep.com.br/ws/${cep}/json/`)
                        .then(res => res.json())
                        .then(dados => {
                            if (!dados.erro) {
                                ruaInput.value = dados.logradouro;
                                bairroInput.value = dados.bairro;
                                document.getElementById("numero").focus();
                            } else {
                                ruaInput.value = "";
                                bairroInput.value = "";
                                alert("CEP não encontrado.");
                            }
                        }).catch(() => alert("Erro ao buscar CEP."));
                }
            });

            // Envio do formulário
            form.addEventListener("submit", async (e) => {
                e.preventDefault();
                btnSubmit.disabled = true;
                btnSubmit.innerText = "Processando...";

                // 🔥 CORREÇÃO 2: Limpando a pontuação do CNPJ/ID para não dar erro no Long.valueOf do Java
                let rawCnpj = document.getElementById("cnpj").value.replace(/\D/g, '');
                if(rawCnpj === "") rawCnpj = "0";

                const body = {
                    nome: document.getElementById("nome").value,
                    email: document.getElementById("email").value,
                    senha: document.getElementById("senha").value,
                    tipo: document.getElementById("tipo").value, 
                    cep: cepInput.value,
                    rua: ruaInput.value,
                    bairro: bairroInput.value,
                    numero: document.getElementById("numero").value,
                    cnpj: rawCnpj 
                };

                try {
                    const response = await fetch(`${BASE_URL}/auth/register`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(body)
                    });

                    // 🔥 CORREÇÃO 3: Tratamento de erro que não quebra se o Java devolver HTML
                    if (!response.ok) {
                        let errorMsg = `Erro no Servidor (${response.status}).`;
                        try {
                            const errorData = await response.json();
                            if(errorData && errorData.message) errorMsg = errorData.message;
                        } catch (jsonErr) {
                            console.error("Servidor retornou erro não-JSON:", response.statusText);
                        }
                        throw new Error(errorMsg);
                    }

                    alert("🚀 Cadastro realizado com sucesso! Você já pode fazer login.");
                    window.location.href = "index.html"; // Joga pra tela de login
                } catch (err) {
                    alert("Falha no cadastro: " + err.message);
                    btnSubmit.disabled = false;
                    btnSubmit.innerText = "Finalizar Cadastro";
                }
            });
        });
    </script>
</body>
</html>
