<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PestControlX - Gestão de Clientes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #16a34a;
            --bg-global: #f8fafc;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        [data-theme="dark"] {
            --primary: #22c55e;
            --bg-global: #0f172a;
            --surface: #1e293b;
            --border: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }

        body {
            background-color: var(--bg-global);
            color: var(--text-main);
            padding: 25px;
            transition: all 0.3s ease;
        }

        .header-dashboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .search-bar { display: flex; gap: 12px; margin-bottom: 20px; }
        .search-bar input {
            flex: 1; padding: 12px 15px; background: var(--surface); color: var(--text-main);
            border: 1px solid var(--border); border-radius: 8px; outline: none; font-size: 14px;
        }
        .search-bar input:focus { border-color: var(--primary); }
        
        .btn-tech {
            background: var(--primary); color: #fff; border: none; padding: 12px 20px;
            border-radius: 8px; font-weight: bold; cursor: pointer; display: flex;
            align-items: center; gap: 8px; font-size: 13px; text-transform: uppercase;
        }

        table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
        th { background: rgba(22, 163, 74, 0.05); padding: 14px; text-align: left; color: var(--primary); font-size: 12px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 14px; border-bottom: 1px solid var(--border); font-size: 14px; }

        .btn-detalhes { background: transparent; color: var(--primary); border: 1px solid var(--primary); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.2s;}
        .btn-detalhes:hover { background: var(--primary); color: #fff; }
        
        .card-perfil { background: var(--surface); border-radius: 12px; padding: 24px; display: flex; gap: 20px; margin-bottom: 20px; border: 1px solid var(--border); }
        .avatar { width: 50px; height: 50px; background: rgba(22,163,74,0.1); border: 1px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .secao-titulo { background: rgba(22, 163, 74, 0.05); color: var(--primary); padding: 8px 15px; border-radius: 6px; font-weight: bold; margin-top: 25px; margin-bottom: 12px; font-size: 12px; text-transform: uppercase; }
        .secao-conteudo p { margin: 10px 0; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header-dashboard">
        <h1 style="font-size: 20px; font-weight: 700;"><i class="fa-solid fa-users" style="color: var(--primary)"></i> Clientes Homologados</h1>
        <button id="btnVoltarTop" class="btn-tech" style="background: var(--surface); color: var(--text-main); border: 1px solid var(--border); display: none;" onclick="voltarTela()"><i class="fa-solid fa-arrow-left"></i> Voltar</button>
    </div>

    <div id="telaLista">
        <div class="search-bar">
            <input type="text" id="inputBusca" placeholder="Pesquisar por nome ou CPF/CNPJ..." oninput="filtrarClientesLocal()">
            <button class="btn-tech" onclick="carregarClientesDoServidor()"><i class="fa-solid fa-rotate"></i> Atualizar</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Nome / Razão Social</th>
                    <th>Documento</th>
                    <th style="text-align: right;">Ações</th>
                </tr>
            </thead>
            <tbody id="tabelaClientes">
                <tr><td colspan="3" style="text-align: center; color: var(--text-muted);">Sincronizando registros com o servidor...</td></tr>
            </tbody>
        </table>
    </div>

    <div id="telaDetalhes" style="display: none;">
        <div class="card-perfil">
            <div class="avatar"><i class="fa-solid fa-user-tie" style="font-size:20px; color:var(--primary)"></i></div>
            <div id="detalheGeral"></div>
        </div>

        <div class="secao-titulo">Dados de contato e Localização</div>
        <div class="secao-conteudo" id="detalheEndereco"></div>
        
        <button class="btn-tech" style="margin-top: 20px;" onclick="voltarTela()">Fechar Ficha</button>
    </div>

<script>
    const API_URL = "https://appdedetizacao.onrender.com";
    const token = localStorage.getItem("token") || localStorage.getItem("TOKEN_AUTH");
    const empresaId = localStorage.getItem("empresaId") || "3"; 
    let clientesGlobais = [];

    async function carregarClientesDoServidor() {
        try {
            const response = await fetch(`${API_URL}/api/clientes/empresa/${empresaId}`, {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}` 
                }
            });

            if (response.ok) {
                clientesGlobais = await response.json();
                renderizarTabela(clientesGlobais);
            }
        } catch (error) {
            document.getElementById("tabelaClientes").innerHTML = "<tr><td colspan='3' style='text-align:center; color:#ef4444;'>Erro ao conectar com o servidor.</td></tr>";
        }
    }

    function renderizarTabela(lista) {
        const tbody = document.getElementById("tabelaClientes");
        tbody.innerHTML = "";
        
        if (lista.length === 0) {
            tbody.innerHTML = "<tr><td colspan='3' style='text-align: center;'>Nenhum cliente vinculado a esta unidade corporativa.</td></tr>";
            return;
        }
        
        lista.forEach(c => {
            tbody.innerHTML += `
                <tr>
                    <td><strong>${c.nome || 'Usuário Móvel'}</strong></td>
                    <td style="color:var(--text-muted);">${c.cnpj || c.cpf || 'Não informado'}</td>
                    <td style="text-align: right;">
                        <button class="btn-detalhes" onclick="abrirDetalhes(${c.id})"><i class="fa-solid fa-address-card"></i> Ver Perfil</button>
                    </td>
                </tr>`;
        });
    }

    function filtrarClientesLocal() {
        const termo = document.getElementById("inputBusca").value.toLowerCase();
        const filtrados = clientesGlobais.filter(c => {
            return (c.nome || '').toLowerCase().includes(termo) || (c.cnpj || c.cpf || '').includes(termo);
        });
        renderizarTabela(filtrados);
    }

    function abrirDetalhes(id) {
        const cliente = clientesGlobais.find(c => c.id === id);
        if(!cliente) return;

        document.getElementById("detalheGeral").innerHTML = `
            <h3 style="font-size:16px; font-weight:700;">${cliente.nome}</h3>
            <p style="font-size:13px; color:var(--text-muted); margin-top:4px;">Código de Registro: <span style="color:var(--primary); font-weight:700;">#${cliente.id}</span></p>`;

        document.getElementById("detalheEndereco").innerHTML = `
            <p><i class="fa-solid fa-phone" style="color:var(--primary); width:20px;"></i> Telefone: <strong>${cliente.telefone || 'Não Informado'}</strong></p>
            <p><i class="fa-solid fa-envelope" style="color:var(--primary); width:20px;"></i> E-mail: <strong>${cliente.email || 'Não Informado'}</strong></p>
            <p><i class="fa-solid fa-location-dot" style="color:var(--primary); width:20px;"></i> Endereço Base: <strong>${cliente.endereco || 'Pendente de Sincronização'}</strong></p>`;

        document.getElementById("telaLista").style.display = "none";
        document.getElementById("btnVoltarTop").style.display = "block";
        document.getElementById("telaDetalhes").style.display = "block";
    }

    function voltarTela() {
        document.getElementById("telaDetalhes").style.display = "none";
        document.getElementById("btnVoltarTop").style.display = "none";
        document.getElementById("telaLista").style.display = "block";
    }

    window.onload = () => {
        if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        carregarClientesDoServidor();
    };
</script>
</body>
</html>
