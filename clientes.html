<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>PestControlX - Clientes</title>
    <style>
        :root {
            --primary: #3DDC84; 
            --surface: #161B26;
            --border: #2D3748;
            --bg-dark: #0F0F12;
            --text-muted: #a0aec0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0F0F12;
            color: #fff;
            margin: 0;
            padding: 25px;
        }

        .header-dashboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .search-bar { display: flex; gap: 12px; margin-bottom: 20px; }
        .search-bar input {
            flex: 1; padding: 12px 15px; background: #11141D; color: #fff;
            border: 1px solid var(--border); border-radius: 6px; outline: none;
            font-size: 14px;
        }
        .search-bar input:focus { border-color: var(--primary); }
        
        .btn-tech {
            background: var(--primary); color: #000; border: none;
            padding: 12px 20px; border-radius: 6px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; gap: 8px; font-size: 13px; text-transform: uppercase;
        }

        table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 8px; overflow: hidden; }
        th { background: rgba(61, 220, 132, 0.08); padding: 14px; text-align: left; color: var(--primary); font-size: 13px; text-transform: uppercase; border-bottom: 1px solid var(--border);}
        td { padding: 14px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 14px; }
        tr:hover td { background: rgba(255,255,255,0.01); }

        .btn-detalhes { background: #11141D; color: var(--primary); border: 1px solid var(--primary); padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.2s;}
        .btn-detalhes:hover { background: var(--primary); color: #000; }
        
        .card-perfil { background: var(--surface); border-radius: 10px; padding: 20px; display: flex; gap: 20px; margin-bottom: 20px; border: 1px solid var(--border); }
        .avatar { width: 55px; height: 55px; background: rgba(61,220,132,0.1); border: 1px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .secao-titulo { background: rgba(61, 220, 132, 0.08); color: var(--primary); padding: 8px 15px; border-radius: 4px; font-weight: bold; margin-top: 20px; margin-bottom: 12px; font-size: 12px; letter-spacing: 0.5px;}
        .secao-conteudo p { margin: 8px 0; padding-bottom: 6px; font-size: 14px; color: #cbd5e1;}
    </style>
</head>
<body>

    <div class="header-dashboard">
        <h1 style="font-size: 24px; margin: 0;"><i class="fa-solid fa-users" style="color: var(--primary)"></i> Base de Clientes Cadastrados</h1>
        <button class="btn-tech" style="background:#242F41; color:#fff; border:1px solid var(--border);" onclick="voltarTela()"><i class="fa-solid fa-arrow-left"></i> Voltar</button>
    </div>

    <div id="telaLista">
        <div class="search-bar">
            <input type="text" id="inputBusca" placeholder="Filtrar por nome ou documento de identificação..." oninput="filtrarClientesLocal()">
            <button class="btn-tech" onclick="carregarClientesDoServidor()"><i class="fa-solid fa-cloud-arrow-down"></i> Sincronizar Banco</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Nome / Razão Social</th>
                    <th>Documento (CPF/CNPJ)</th>
                    <th style="text-align: right;">Ações de Controle</th>
                </tr>
            </thead>
            <tbody id="tabelaClientes">
                <tr><td colspan="3" style="text-align: center; color: var(--primary);">Consultando servidores REST API...</td></tr>
            </tbody>
        </table>
    </div>

    <div id="telaDetalhes" style="display: none;">
        <div class="card-perfil">
            <div class="avatar">
                <i class="fa-solid fa-user-tie" style="font-size:24px; color:var(--primary)"></i>
            </div>
            <div id="detalheGeral"></div>
        </div>

        <div class="secao-titulo">Canais de Contato e Localidade Física</div>
        <div class="secao-conteudo" id="detalheEndereco"></div>
        
        <br>
        <button class="btn-tech" onclick="voltarTela()">Fechar Ficha Corporativa</button>
    </div>

<script>
    const API_URL = "https://appdedetizacao.onrender.com";
    const token = localStorage.getItem("tokenJWT") || localStorage.getItem("token") || localStorage.getItem("token_usuario") || localStorage.getItem("TOKEN_AUTH");
    const empresaId = localStorage.getItem("empresaId") || localStorage.getItem("usuario_id") || "1";
    
    let clientesGlobais = [];

    async function carregarClientesDoServidor() {
    // 1. Pega o token que foi salvo no login
    const token = localStorage.getItem('token'); 

    try {
        const response = await fetch('https://appdedetizacao.onrender.com/api/clientes/empresa/3', {
            method: 'GET',
            headers: {
                'Content-Type': 'application/json',
                // 2. Envia o token no formato Bearer
                'Authorization': `Bearer ${token}` 
            }
        });

        if (!response.ok) {
            throw new Error(`Status: ${response.status}`);
        }

        const data = await response.json();
        console.log(data);
        // ... sua lógica para renderizar os clientes
        
    } catch (error) {
        console.error("Erro ao carregar clientes:", error);
    }
}

    function renderizarTabela(lista) {
        const tbody = document.getElementById("tabelaClientes");
        if (!tbody) return;
        tbody.innerHTML = "";
        
        if (!lista || lista.length === 0) {
            tbody.innerHTML = "<tr><td colspan='3' style='text-align: center;'>Nenhum cliente indexado para a filial de sua empresa.</td></tr>";
            return;
        }
        
        lista.forEach(c => {
            const nome = c.nome || c.nomeCompleto || 'Sem Identificação';
            const documento = c.cpf || c.cnpj || 'Isento/Não Informado';
            tbody.innerHTML += `
                <tr>
                    <td><strong style="color:#fff;">${nome}</strong></td>
                    <td style="color:var(--text-muted);">${documento}</td>
                    <td style="text-align: right;"><button class="btn-detalhes" onclick="abrirDetalhes(${c.id})"><i class="fa-solid fa-address-card"></i> Ficha Completa</button></td>
                </tr>
            `;
        });
    }

    function filtrarClientesLocal() {
        const termo = document.getElementById("inputBusca").value.toLowerCase();
        const filtrados = clientesGlobais.filter(c => {
            const nome = (c.nome || c.nomeCompleto || '').toLowerCase();
            const doc = (c.cpf || c.cnpj || '').toLowerCase();
            return nome.includes(termo) || doc.includes(termo);
        });
        renderizarTabela(filtrados);
    }

    function abrirDetalhes(id) {
        const cliente = clientesGlobais.find(c => c.id === id);
        if(!cliente) return;

        document.getElementById("detalheGeral").innerHTML = `
            <h3 style="margin:0 0 5px 0;">${cliente.nome || cliente.nomeCompleto}</h3>
            <p style="margin:0; font-size:13px; color:var(--text-muted);">ID único de Banco: <span style="color:var(--primary);">#${cliente.id}</span></p>
        `;

        document.getElementById("detalheEndereco").innerHTML = `
            <p><i class="fa-solid fa-phone" style="color:var(--primary); width:20px;"></i> Telefone Celular: <strong>${cliente.telefone || 'Não registrado'}</strong></p>
            <p><i class="fa-solid fa-envelope" style="color:var(--primary); width:20px;"></i> E-mail Corporativo: <strong>${cliente.email || 'Não registrado'}</strong></p>
            <p><i class="fa-solid fa-location-dot" style="color:var(--primary); width:20px;"></i> Endereço Operacional: <strong>${cliente.endereco || cliente.rua || 'Pendente via app'}</strong></p>
        `;

        document.getElementById("telaLista").style.display = "none";
        document.getElementById("telaDetalhes").style.display = "block";
    }

    function voltarTela() {
        if (document.getElementById("telaDetalhes").style.display === "block") {
            document.getElementById("telaDetalhes").style.display = "none";
            document.getElementById("telaLista").style.display = "block";
        } else {
            window.parent.postMessage('voltarDashboard', '*');
        }
    }

    window.onload = carregarClientesDoServidor;
</script>
</body>
</html>
