<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PestControlX - Roteamento Tático</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* TEMA CYBER-INDUSTRIAL / NEON */
        :root {
            --primary: #3DDC84;
            --primary-hover: #2eb369;
            --bg-global: #f6f6f6;
            --surface: #161b22;
            --border: #30363d;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }

        body {
            background-color: var(--bg-global);
            color: var(--text-main);
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            width: 100%;
            max-width: 550px;
            background: var(--surface);
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(61, 220, 132, 0.05);
            border: 1px solid var(--border);
        }

        h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: #ffffff; text-transform: uppercase; letter-spacing: 1px;}
        .subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 25px; }

        .badge-info { 
            background: rgba(61, 220, 132, 0.1); 
            border: 1px solid rgba(61, 220, 132, 0.3); 
            padding: 12px; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            font-size: 13px; 
            color: var(--primary); 
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); }
        
        input, select {
            width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 8px;
            background: #010409; color: #ffffff; font-size: 14px; outline: none; transition: all 0.2s;
            color-scheme: dark;
        }
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(61, 220, 132, 0.2); }

        .btn-schedule {
            width: 100%; padding: 14px; background: var(--primary); color: #000000;
            border: none; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; transition: 0.2s;
            margin-top: 10px;
        }
        .btn-schedule:hover { background: var(--primary-hover); transform: translateY(-2px); }

        /* Estilização dos Popups Customizados (Modals) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        
        .modal-box {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 12px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transform: scale(0.8);
            transition: transform 0.3s ease;
        }
        .modal-overlay.active .modal-box { transform: scale(1); }
        
        .modal-icon { font-size: 42px; margin-bottom: 15px; }
        .modal-box h3 { color: #ffffff; font-size: 18px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        .modal-box p { color: var(--text-main); font-size: 14px; line-height: 1.5; margin-bottom: 22px; }
        
        .modal-btn {
            padding: 10px 24px; background: var(--primary); color: #000000;
            border: none; border-radius: 6px; font-weight: 700; text-transform: uppercase;
            font-size: 12px; cursor: pointer; letter-spacing: 0.5px; transition: background 0.2s;
        }
        .modal-btn:hover { background: var(--primary-hover); }

        /* Estados do Pop-up baseados no contexto */
        .modal-success { border-color: var(--primary); box-shadow: 0 0 15px rgba(61, 220, 132, 0.2); }
        .modal-success .modal-icon { color: var(--primary); }
        
        .modal-error { border-color: #ff4a4a; box-shadow: 0 0 15px rgba(255, 74, 74, 0.2); }
        .modal-error .modal-icon { color: #ff4a4a; }
        
        .modal-warning { border-color: #ffaa00; box-shadow: 0 0 15px rgba(255, 170, 0, 0.2); }
        .modal-warning .modal-icon { color: #ffaa00; }
    </style>
</head>
<body>

    <div class="card">
        <h1><i class="fa-solid fa-satellite-dish" style="color: var(--primary);"></i> Roteamento Tático</h1>
        <p class="subtitle">Defina o cronograma e aloque a viatura. O dispositivo do técnico será sincronizado em tempo real.</p>

        <div class="badge-info">
            <i class="fa-solid fa-crosshairs fa-spin"></i>
            <span>Despachando Ordem de Serviço: <strong id="lblOrdem">#...</strong></span>
        </div>

        <form id="formAgenda" onsubmit="confirmarAgendamento(event)">
            <div class="form-group">
                <label for="dataExecucao">Data Prevista da Operação</label>
                <input type="date" id="dataExecucao" required>
            </div>

            <div class="form-group">
                <label for="periodo">Janela de Turno</label>
                <select id="periodo" required>
                    <option value="MANHA">Manhã (08:00 - 12:00)</option>
                    <option value="TARDE" selected>Tarde (13:00 - 18:00)</option>
                    <option value="NOITE">Noturno (19:00 - 23:00)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="tecnicoId">Operador de Campo (Técnico)</label>
                <select id="tecnicoId" required>
                    <option value="" disabled selected>Carregando técnicos...</option>
                </select>
            </div>

            <button type="submit" id="btnSalvar" class="btn-schedule"><i class="fa-solid fa-bolt"></i> Confirmar Rota e Notificar App</button>
        </form>
    </div>

    <div id="customModal" class="modal-overlay">
        <div class="modal-box">
            <div id="modalIcon" class="modal-icon"></div>
            <h3 id="modalTitle">Título</h3>
            <p id="modalMessage">Mensagem informativa.</p>
            <button id="modalBtn" class="modal-btn">OK</button>
        </div>
    </div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const ordemId = urlParams.get('ordemId');

    // Função centralizadora para exibir os pop-ups premium
    function exibirPopup(titulo, mensagem, tipo = 'success', callback = null) {
        const modal = document.getElementById("customModal");
        const modalBox = modal.querySelector(".modal-box");
        const iconDiv = document.getElementById("modalIcon");
        
        document.getElementById("modalTitle").innerText = titulo;
        document.getElementById("modalMessage").innerText = mensagem;
        
        // Remove classes antigas
        modalBox.className = "modal-box";
        
        // Aplica o comportamento do tema com base no tipo
        if (tipo === 'success') {
            modalBox.classList.add("modal-success");
            iconDiv.innerHTML = '<i class="fa-solid fa-circle-check"></i>';
        } else if (tipo === 'error') {
            modalBox.classList.add("modal-error");
            iconDiv.innerHTML = '<i class="fa-solid fa-circle-xmark"></i>';
        } else if (tipo === 'warning') {
            modalBox.classList.add("modal-warning");
            iconDiv.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>';
        }
        
        modal.classList.add("active");
        
        // Configura a ação de fechamento e o callback opcional
        document.getElementById("modalBtn").onclick = function() {
            modal.classList.remove("active");
            if (callback) callback();
        };
    }

    if (!ordemId) {
        exibirPopup("Erro Crítico", "ID da Ordem de Serviço não foi identificado na URL de roteamento.", "error");
    } else {
        document.getElementById("lblOrdem").innerHTML = `#${ordemId}`;
    }

    async function carregarTecnicosDisponiveis() {
        let token = localStorage.getItem("token") || localStorage.getItem("TOKEN_AUTH") || "";
        token = token.replace(/^"|"$/g, '').trim();

        // 🟢 Puxa o ID da empresa da mesma forma segura que fizemos no equipe.html
        const idEmpresaRaw = localStorage.getItem("empresaId") || localStorage.getItem("id_empresa") || "";
        const idEmpresa = idEmpresaRaw.toString().replace(/^"|"$/g, '').trim();
        const selectTecnico = document.getElementById("tecnicoId");

        if (!idEmpresa || !selectTecnico) {
            if(selectTecnico) selectTecnico.innerHTML = '<option value="" disabled>Erro: Sessão inválida. Refaça o login.</option>';
            return;
        }

        try {
            // 🟢 Usando a rota geral que sabemos que funciona perfeitamente
            const url = `https://appdedetizacao.onrender.com/api/funcionarios`;
            const response = await fetch(url, {
                method: "GET",
                headers: { "Authorization": `Bearer ${token}` }
            });

            if (response.ok) {
                const todosFuncionarios = await response.json();
                
                // 🟢 Filtramos os técnicos garantindo que pertençam apenas à empresa atual
                const tecnicosDaEmpresa = todosFuncionarios.filter(tec => 
                    tec.empresa_id == idEmpresa || 
                    (tec.empresa && tec.empresa.id == idEmpresa)
                );

                selectTecnico.innerHTML = '<option value="" disabled selected>Selecione um Agente...</option>';
                
                if (tecnicosDaEmpresa.length === 0) {
                    selectTecnico.innerHTML = '<option value="" disabled>Nenhum técnico cadastrado na base.</option>';
                    return;
                }

                tecnicosDaEmpresa.forEach(tec => {
                    const option = document.createElement("option");
                    option.value = tec.id;
                    option.text = `${tec.nome} - Rádio: ${tec.telefone || 'N/A'}`;
                    selectTecnico.appendChild(option);
                });
            } else {
                selectTecnico.innerHTML = '<option value="" disabled>Erro ao carregar frota de técnicos</option>';
            }
        } catch (error) {
            console.error("Falha ao puxar técnicos:", error);
            selectTecnico.innerHTML = '<option value="" disabled>Falha de conexão com a base corporativa</option>';
        }
    }

    async function confirmarAgendamento(e) {
        e.preventDefault();
        const btn = document.getElementById("btnSalvar");
        btn.disabled = true;
        btn.innerText = "TRANSMITINDO...";

        let token = localStorage.getItem("token") || localStorage.getItem("TOKEN_AUTH") || "";
        token = token.replace(/^"|"$/g, '').trim();

        const dataRaw = document.getElementById("dataExecucao").value; 
        const turno = document.getElementById("periodo").value;
        const tecnicoId = document.getElementById("tecnicoId").value;

        if (!tecnicoId) {
            exibirPopup("Aviso de Sistema", "Por favor, selecione um operador de campo para realizar o despacho tático!", "warning");
            btn.disabled = false;
            btn.innerHTML = "<i class='fa-solid fa-bolt'></i> Confirmar Rota e Notificar App";
            return;
        }

        const [ano, mes, dia] = dataRaw.split("-");
        const dataFormatada = `${dia}/${mes}/${ano}`; 

        try {
            const url = `https://appdedetizacao.onrender.com/api/ordens/${ordemId}/aceitar?funcionarioId=${tecnicoId}&data=${dataFormatada}&status=EM_ANDAMENTO`;

            const response = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                }
            });

            if (!response.ok) {
                throw new Error(`Falha HTTP: ${response.status}`);
            }

            exibirPopup("🚀 ROTA HOMOLOGADA!", "O plano operacional foi enviado. O aplicativo móvel do técnico foi sincronizado em tempo real.", "success", () => {
                if (window.opener) {
                    window.close();
                } else {
                    window.location.href = "solicitacoes.html"; 
                }
            });

        } catch (err) {
            console.error(err);
            exibirPopup("Falha de Comunicação", "Não foi possível sincronizar as rotas com o servidor remoto da nuvem.", "error");
            btn.disabled = false;
            btn.innerHTML = "<i class='fa-solid fa-bolt'></i> Tentar Novamente";
        }
    }

    // Função para disparar a ordem para o celular do técnico
function transmitirParaTecnico(ordemId) {
    const token = localStorage.getItem("token") || localStorage.getItem("TOKEN_AUTH");
    
    Swal.fire({
        title: 'Transmitir Rota?',
        text: "Isso enviará a O.S. diretamente para o mapa do técnico em campo.",
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: 'Transmitir Agora',
        background: '#161b22',
        color: '#fff'
    }).then((result) => {
        if (result.isConfirmed) {
            // Faz um PUT para mudar o status para ATIVO
            fetch(`https://appdedetizacao.onrender.com/api/ordens/${ordemId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ status: "ATIVO" }) // O backend precisa aceitar essa mudança de status
            })
            .then(res => {
                if(res.ok) {
                    Swal.fire('Transmitido!', 'O técnico recebeu a rota no mapa.', 'success');
                    // O app Android (GpsActivity) vai detectar que a OS mudou de status via polling ou refresh
                } else {
                    Swal.fire('Erro', 'Falha ao transmitir.', 'error');
                }
            });
        }
    });
}

    window.onload = () => {
        const inputData = document.getElementById('dataExecucao');
        if (inputData) {
            inputData.min = new Date().toISOString().split("T")[0];
        }
        carregarTecnicosDisponiveis();
    };
</script>
</body>
</html>
